<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SDHub · Service Desk (Movidesk) — TOTVS SC</title>
<!-- Camada de dados Supabase (login, leitura, edge functions). Deve vir antes de tudo. -->
<script src="supabase-data.js"></script>
<style>
  :root{
    --roxo:#5B2E91; --roxo2:#7A44BE; --roxo-esc:#3F1F66;
    --bg:#f4f1fa; --card:#ffffff; --linha:#e7e0f3; --txt:#2a2140; --mut:#7a7290;
    --nov:#2563eb; --and:#0891b2; --esp:#d97706; --imp:#dc2626; --res:#16a34a; --cli:#7c3aed;
    --shadow:0 1px 3px rgba(60,30,110,.08),0 6px 18px rgba(60,30,110,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{background:linear-gradient(100deg,var(--roxo-esc),var(--roxo) 55%,var(--roxo2));color:#fff;padding:16px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header .brand{font-size:19px;font-weight:800;letter-spacing:.2px}
  header .brand small{display:block;font-size:11px;font-weight:500;opacity:.85;letter-spacing:.4px}
  header .sp{flex:1}
  header .who{font-size:12px;opacity:.9}
  header button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-weight:600}
  header button:hover{background:rgba(255,255,255,.24)}

  .kpis{display:flex;gap:12px;padding:16px 22px 4px;flex-wrap:wrap}
  .kpi{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:12px 16px;min-width:120px;flex:1}
  .kpi .n{font-size:24px;font-weight:800;line-height:1}
  .kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:5px}
  .kpi.acc-nov .n{color:var(--nov)} .kpi.acc-esp .n{color:var(--esp)}
  .kpi.acc-res .n{color:var(--res)} .kpi.acc-task .n{color:var(--cli)}

  .toolbar{display:flex;gap:10px;padding:12px 22px;flex-wrap:wrap;align-items:center}
  .toolbar input,.toolbar select{border:1px solid var(--linha);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;color:var(--txt)}
  .toolbar input[type=search]{min-width:230px}
  .toolbar label.chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);cursor:pointer}
  .toolbar .count{margin-left:auto;font-size:12px;color:var(--mut)}

  .board{display:flex;gap:14px;padding:6px 22px 30px;overflow-x:auto;align-items:flex-start;min-height:50vh}
  .col{background:transparent;min-width:290px;max-width:320px;flex:0 0 auto}
  .col h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--roxo-esc);margin:0 0 8px;display:flex;align-items:center;gap:8px}
  .col h3 .dot{width:9px;height:9px;border-radius:50%}
  .col h3 .qt{margin-left:auto;background:var(--linha);color:var(--roxo-esc);border-radius:20px;padding:1px 9px;font-size:11px}
  .col .stack{display:flex;flex-direction:column;gap:9px}

  .tk{background:var(--card);border-radius:11px;box-shadow:var(--shadow);padding:11px 12px;cursor:pointer;border-left:4px solid var(--linha);transition:transform .08s}
  .tk:hover{transform:translateY(-1px)}
  .tk .top{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:5px}
  .tk .proto{font-size:11px;color:var(--mut);font-weight:600}
  .tk .subj{font-size:13px;font-weight:600;line-height:1.3;margin:2px 0 7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tk .org{font-size:12px;color:var(--roxo);font-weight:600;display:flex;align-items:center;gap:5px}
  .tk .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
  .b-urg{background:#fdecec;color:#c0392b} .b-urg.med{background:#fff4e2;color:#b8730a} .b-urg.baixa{background:#eef7ee;color:#2f7d33}
  .b-age{background:#f0edf8;color:#5B2E91} .b-age.old{background:#fdecec;color:#c0392b}
  .b-task{background:#efe7fb;color:#7c3aed} .b-notask{background:#f2f2f4;color:#8a8698}
  .b-arc{background:#fdf0e6;color:#b8631a}
  .b-act{background:#e7f1fd;color:#2563eb}

  /* drawer */
  .ov{position:fixed;inset:0;background:rgba(30,15,55,.45);display:none;z-index:900}
  .ov.open{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(920px,97vw);background:#fff;box-shadow:-8px 0 40px rgba(40,20,80,.25);transform:translateX(100%);transition:transform .22s;z-index:901;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer .dh{background:linear-gradient(100deg,var(--roxo-esc),var(--roxo));color:#fff;padding:16px 18px}
  .drawer .dh .proto{font-size:11px;opacity:.85;font-weight:600}
  .drawer .dh .subj{font-size:15px;font-weight:700;margin-top:3px;line-height:1.3}
  .drawer .dh .x{position:absolute;top:12px;right:14px;background:none;border:0;color:#fff;font-size:22px;cursor:pointer;line-height:1}
  .drawer .db{padding:16px 18px;overflow-y:auto;flex:1}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 18px;margin-bottom:16px}
  .acts{display:flex;gap:18px;flex-wrap:wrap}
  .acts>.sec{flex:1 1 340px;min-width:300px;border-top:none;padding-top:0;margin-top:0}
  .db .acts{border-top:1px solid var(--linha);padding-top:16px;margin-top:6px}
  @media(max-width:720px){ .grid{grid-template-columns:1fr 1fr} }
  .fld .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
  .fld .v{font-size:13px;font-weight:600;margin-top:1px;word-break:break-word}
  .sec{border-top:1px solid var(--linha);padding-top:14px;margin-top:6px}
  .sec h4{margin:0 0 10px;font-size:13px;color:var(--roxo-esc);display:flex;align-items:center;gap:7px}
  .sec label{display:block;font-size:11px;color:var(--mut);margin:8px 0 3px;text-transform:uppercase;letter-spacing:.3px}
  .sec input,.sec textarea,.sec select{width:100%;border:1px solid var(--linha);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit}
  .sec textarea{min-height:80px;resize:vertical}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .btn{border:0;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
  .btn.prim{background:var(--roxo);color:#fff}.btn.prim:hover{background:var(--roxo-esc)}
  .btn.warn{background:#0e9f6e;color:#fff}
  .btn.ghost{background:#f0edf8;color:var(--roxo)}
  .btn:disabled{opacity:.55;cursor:default}
  .hint{font-size:11px;color:var(--mut);margin-top:4px;line-height:1.4}
  .msg{border-radius:8px;padding:9px 11px;font-size:12px;margin-top:10px;display:none}
  .msg.ok{background:#e7f7ee;color:#12703f;display:block}
  .msg.er{background:#fdecec;color:#c0392b;display:block}
  .chkrow{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:12px;color:var(--txt)}
  /* multi-select dropdown */
  .msel{position:relative}
  .msel-box{border:1px solid var(--linha);border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;cursor:pointer;min-height:38px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
  .msel-box .ph{color:var(--mut)}
  .msel-chip{background:#efe7fb;color:#5B2E91;border-radius:12px;padding:2px 8px;font-size:11px;display:inline-flex;align-items:center;gap:5px}
  .msel-chip .x{cursor:pointer;font-weight:700}
  .msel-panel{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--linha);border-radius:8px;box-shadow:var(--shadow);max-height:240px;overflow:auto;z-index:20;display:none;padding:5px}
  .msel-panel.open{display:block}
  .msel-grp{font-size:10px;text-transform:uppercase;color:var(--mut);letter-spacing:.4px;padding:6px 8px 2px;font-weight:700}
  .msel-opt{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:12px;cursor:pointer;border-radius:6px}
  .msel-opt:hover{background:#f5f2fc}
  .msel-opt input{width:14px;height:14px}
  .exist{background:#efe7fb;border:1px solid #d9c8f4;border-radius:8px;padding:8px 10px;font-size:12px;color:#5b2e91;margin-bottom:8px}
  .center-load{padding:60px;text-align:center;color:var(--mut);font-size:14px;width:100%}
  /* timeline */
  .tl-load{color:var(--mut);font-size:12px;padding:10px 2px}
  #tl{display:flex;flex-direction:column;gap:10px;max-height:none}
  .tlitem{border:1px solid var(--linha);border-radius:10px;padding:10px 12px;background:#fbfaff}
  .tlh{font-size:12px;color:var(--roxo-esc);margin-bottom:6px}
  .tlh b{color:var(--txt)} .tlh i{color:var(--mut);font-style:normal}
  .tlb{font-size:12.5px;color:var(--txt);line-height:1.5;white-space:normal;word-break:break-word}
  .tlmore,.tluse{margin-top:8px;margin-right:8px;background:#f0edf8;color:var(--roxo);border:0;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
  .tluse{background:#e7f1fd;color:var(--nov)}
  .tlbar{position:sticky;top:0;background:#fff;padding:8px 0;font-size:11px;color:var(--mut);display:flex;flex-wrap:wrap;gap:6px;align-items:center;z-index:2;border-bottom:1px solid var(--linha);margin-bottom:4px}
  .tlbtn{border:0;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;background:var(--roxo);color:#fff}
  .tlbtn.occ{background:#0e9f6e}
  .tlbtn.ghost{background:#f0edf8;color:var(--roxo)}
  .tlpick{display:inline-flex;align-items:center;margin-right:6px}
  .tlpick input{width:15px;height:15px}
</style>
</head>
<body>
<header>
  <div class="brand">SDHub · Service Desk<small>MOVIDESK × TASKS SC — TOTVS SANTA CATARINA</small></div>
  <div class="sp"></div>
  <div class="who" id="who"></div>
  <button id="btnReload">↻ Recarregar</button>
  <button id="btnLogout">Sair</button>
</header>

<div class="kpis" id="kpis"></div>

<div class="toolbar">
  <input type="search" id="q" placeholder="Buscar assunto, protocolo, empresa…">
  <select id="fEmpresa"><option value="">Todas as empresas</option></select>
  <select id="fUrg"><option value="">Toda urgência</option></select>
  <select id="fTask">
    <option value="">Task SC: todas</option>
    <option value="sem">Sem Task SC</option>
    <option value="com">Com Task SC</option>
  </select>
  <select id="fUpd">
    <option value="">Atualização: todas</option>
    <option value="hoje">Hoje</option>
    <option value="ontem">Ontem</option>
    <option value="semana">Esta semana</option>
    <option value="restante">O restante</option>
  </select>
  <label class="chk"><input type="checkbox" id="fResolv"> mostrar resolvidos/arquivados</label>
  <span class="count" id="count"></span>
</div>

<div class="board" id="board"><div class="center-load">Carregando tickets…</div></div>

<!-- Drawer de detalhes -->
<div class="ov" id="ov"></div>
<div class="drawer" id="drawer">
  <div class="dh" style="position:relative">
    <button class="x" id="dx">×</button>
    <div class="proto" id="d-proto"></div>
    <div class="subj" id="d-subj"></div>
  </div>
  <div class="db" id="d-body"></div>
</div>

<script>
(function(){
  "use strict";
  var TICKETS = [];       // payloads Movidesk
  var CUR = null;         // ticket aberto no drawer

  // ---------- ordenação canônica das colunas ----------
  var ORDER = ["Novo","Em atendimento","Aguardando Consultoria","Em Espera","Impeditivo","Em Validação","Em Validação (Cliente)","Resolvido","Cancelado"];
  function colColor(st){
    var s=(st||"").toLowerCase();
    if(s.indexOf("novo")>=0) return "var(--nov)";
    if(s.indexOf("atend")>=0) return "var(--and)";
    if(s.indexOf("consultor")>=0||s.indexOf("espera")>=0||s.indexOf("aguard")>=0) return "var(--esp)";
    if(s.indexOf("impedit")>=0) return "var(--imp)";
    if(s.indexOf("valida")>=0) return "var(--cli)";
    if(s.indexOf("resolv")>=0) return "var(--res)";
    return "var(--roxo2)";
  }

  function daysSince(iso){ if(!iso) return null; var d=new Date(iso); if(isNaN(d)) return null; return Math.floor((Date.now()-d.getTime())/86400000); }
  function fmtDate(iso){ if(!iso) return "—"; var d=new Date(iso); if(isNaN(d)) return iso; return d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"}); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  // "ativo" = status não-terminal (Novo/Em atendimento/Parado). O is_archived do
  // sync não define isso: um ticket pode sumir da mesa e ainda estar aberto.
  function isActive(t){ var b=(t.base_status||""); return b!=="Resolved" && b!=="Closed" && b!=="Canceled"; }
  function urgClass(u){ var s=(u||"").toLowerCase(); if(s.indexOf("alta")>=0||s.indexOf("1:")>=0||s.indexOf("crít")>=0) return ""; if(s.indexOf("méd")>=0||s.indexOf("med")>=0||s.indexOf("2:")>=0) return "med"; return "baixa"; }

  // bucket de atualização por last_update (novos movimentos)
  function updBucket(t){
    var d=t.last_update; if(!d) return "restante";
    var dt=new Date(d); if(isNaN(dt)) return "restante";
    var now=new Date();
    function ymd(x){ return x.getFullYear()+"-"+x.getMonth()+"-"+x.getDate(); }
    var yest=new Date(now.getTime()-86400000);
    var ds=ymd(dt);
    if(ds===ymd(now)) return "hoje";
    if(ds===ymd(yest)) return "ontem";
    if((now.getTime()-dt.getTime())/86400000<=7) return "semana";
    return "restante";
  }

  // ---------- filtros ----------
  function passesFilters(t){
    var fu=document.getElementById("fUpd").value; if(fu && updBucket(t)!==fu) return false;
    var showRes = document.getElementById("fResolv").checked;
    if(!showRes && !isActive(t)) return false;
    var q=(document.getElementById("q").value||"").trim().toLowerCase();
    if(q){ var hay=[(t.subject||""),(t.protocol||""),(t.client_organization||""),(t.client_name||"")].join(" ").toLowerCase(); if(hay.indexOf(q)<0) return false; }
    var emp=document.getElementById("fEmpresa").value; if(emp && (t.client_organization||"")!==emp) return false;
    var urg=document.getElementById("fUrg").value; if(urg && (t.urgency||"")!==urg) return false;
    var tk=document.getElementById("fTask").value;
    if(tk==="sem" && t.tasks_id) return false;
    if(tk==="com" && !t.tasks_id) return false;
    return true;
  }

  // ---------- KPIs ----------
  function renderKpis(){
    var active=TICKETS.filter(isActive);
    var novos=active.filter(function(t){return (t.base_status==="New")||/novo/i.test(t.status||"");}).length;
    var espera=active.filter(function(t){return /consultor|espera|aguard/i.test(t.status||"");}).length;
    var semTask=active.filter(function(t){return !t.tasks_id;}).length;
    var resolvidos=TICKETS.filter(function(t){return !isActive(t);}).length;
    var k=[
      {n:active.length,l:"Ativos",c:""},
      {n:novos,l:"Novos",c:"acc-nov"},
      {n:espera,l:"Aguardando",c:"acc-esp"},
      {n:semTask,l:"Sem Task SC",c:"acc-task"},
      {n:resolvidos,l:"Resolvidos",c:"acc-res"}
    ];
    document.getElementById("kpis").innerHTML=k.map(function(x){return '<div class="kpi '+x.c+'"><div class="n">'+x.n+'</div><div class="l">'+x.l+'</div></div>';}).join("");
  }

  // ---------- popular selects ----------
  function fillSelects(){
    var emp={}, urg={};
    TICKETS.forEach(function(t){ if(t.client_organization) emp[t.client_organization]=1; if(t.urgency) urg[t.urgency]=1; });
    var se=document.getElementById("fEmpresa"), su=document.getElementById("fUrg");
    Object.keys(emp).sort().forEach(function(e){ se.insertAdjacentHTML("beforeend",'<option>'+esc(e)+'</option>'); });
    Object.keys(urg).sort().forEach(function(u){ su.insertAdjacentHTML("beforeend",'<option>'+esc(u)+'</option>'); });
  }

  // ---------- board ----------
  function render(){
    var list=TICKETS.filter(passesFilters);
    document.getElementById("count").textContent=list.length+" de "+TICKETS.length+" tickets";
    var cols={};
    list.forEach(function(t){ var s=t.status||t.base_status||"Sem status"; (cols[s]=cols[s]||[]).push(t); });
    var keys=Object.keys(cols).sort(function(a,b){
      var ia=ORDER.indexOf(a), ib=ORDER.indexOf(b);
      if(ia<0)ia=99; if(ib<0)ib=99; if(ia!==ib) return ia-ib; return a.localeCompare(b);
    });
    var board=document.getElementById("board");
    if(!list.length){ board.innerHTML='<div class="center-load">Nenhum ticket com os filtros atuais.</div>'; return; }
    board.innerHTML=keys.map(function(s){
      var items=cols[s].sort(function(a,b){ return new Date(b.last_update||0)-new Date(a.last_update||0); });
      return '<div class="col"><h3><span class="dot" style="background:'+colColor(s)+'"></span>'+esc(s)+'<span class="qt">'+items.length+'</span></h3><div class="stack">'+
        items.map(cardHtml).join("")+'</div></div>';
    }).join("");
    [].forEach.call(board.querySelectorAll(".tk"),function(el){ el.addEventListener("click",function(){ openDrawer(el.getAttribute("data-id")); }); });
  }

  function cardHtml(t){
    var age=daysSince(t.last_update);
    var ageB= age==null?"":'<span class="badge b-age'+(age>7?' old':'')+'">'+age+'d</span>';
    var urgB= t.urgency?'<span class="badge b-urg '+urgClass(t.urgency)+'">'+esc(t.urgency)+'</span>':'';
    var taskB= t.tasks_id?'<span class="badge b-task">Task '+esc(t.tasks_id)+'</span>':'<span class="badge b-notask">sem Task</span>';
    var actB= t.last_action_count?'<span class="badge b-act">'+t.last_action_count+' ações</span>':'';
    var arcB= String(t.is_archived)==="1"?'<span class="badge b-arc">arquivado</span>':'';
    return '<div class="tk" data-id="'+esc(t.id)+'" style="border-left-color:'+colColor(t.status)+'">'+
      '<div class="top"><span class="proto">#'+esc(t.protocol||t.id)+'</span></div>'+
      '<div class="subj">'+esc(t.subject||"(sem assunto)")+'</div>'+
      '<div class="org">🏢 '+esc(t.client_organization||t.client_name||"—")+'</div>'+
      '<div class="meta">'+urgB+ageB+actB+arcB+taskB+'</div>'+
    '</div>';
  }

  // ---------- mapas do Movidesk (iguais ao app.py local) ----------
  var ORIGIN={0:"Primeira ação",1:"Web (cliente)",2:"Web (agente)",3:"Email",4:"Gatilho do sistema",5:"Chat online",6:"Chat offline",7:"Email do sistema",8:"Formulário",9:"API",10:"Agendamento",13:"Telefone (recebida)",14:"Telefone (efetuada)",18:"WhatsApp",22:"Facebook Messenger",23:"WhatsApp Business"};
  function originLabel(o){ return ORIGIN[o]!=null?ORIGIN[o]:("Origem "+o); }
  function typeEmoji(tp){ return tp===1?"🔒":"💬"; }
  var SEED=null, CONS=null, TAGS=null;

  // ---------- drawer ----------
  function openDrawer(id){
    CUR=TICKETS.filter(function(t){return String(t.id)===String(id);})[0];
    if(!CUR) return;
    document.getElementById("d-proto").textContent="#"+(CUR.protocol||CUR.id)+"  ·  status: "+(CUR.status||CUR.base_status||"—");
    document.getElementById("d-subj").textContent=CUR.subject||"(sem assunto)";
    document.getElementById("d-body").innerHTML=bodyHtml(CUR);
    wireDrawer(CUR);
    document.getElementById("ov").classList.add("open");
    document.getElementById("drawer").classList.add("open");
    loadDetail(CUR);
  }

  async function loadDetail(t){
    try{
      if(!SEED) SEED=await window.TSC.seedClients();
      var dl=document.getElementById("seedlist");
      if(dl) dl.innerHTML=SEED.map(function(c){ return '<option value="'+esc(c.code)+'">'+esc(c.name)+'</option>'; }).join("");
      var sug=suggestClient(t.client_organization||t.client_name||"");
      var inp=document.getElementById("ct-customer"), sh=document.getElementById("ct-sug");
      if(sug && inp && !inp.value){ inp.value=sug.code; if(sh) sh.innerHTML='✅ Sugerido: <b>'+esc(sug.code)+'</b> — '+esc(sug.name); }
      // responsáveis do cliente (assigned_customer) conforme o código do cliente
      if(inp){
        loadClienteResp(inp.value.trim());
        inp.addEventListener("change",function(){ loadClienteResp(inp.value.trim()); });
      }
    }catch(e){}
    // consultores (Responsável) → select, com default marcado
    try{
      if(!CONS) CONS=await window.TSC.consultants();
      var us=document.getElementById("ct-user");
      if(us){
        var def=(CONS.filter(function(c){return c.def;})[0]||{}).code||"000019";
        us.innerHTML='<option value="">— selecione —</option>'+CONS.map(function(c){
          return '<option value="'+esc(c.code)+'"'+(c.code===def?' selected':'')+'>'+esc(c.name)+' ('+esc(c.code)+')</option>';
        }).join("");
      }
      fillObservers();
    }catch(e){}
    // tags (nome no lugar do código) → default SERVICE DESK (000232)
    try{
      if(!TAGS) TAGS=await window.TSC.tags();
      var ts=document.getElementById("ct-tags");
      if(ts && TAGS.length){
        ts.innerHTML=TAGS.map(function(g){

        }).join("");

    if(t.actions && t.actions.length){ renderTimeline(t); return; }

    try{

  function norm(s){ return (s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").toLowerCase(); }
  var SKIP={"de":1,"da":1,"do":1,"dos":1,"das":1,"ltda":1,"sa":1,"me":1,"epp":1,"eireli":1,"e":1,"industria":1,"comercio":1,"com":1,"ind":1};
  function suggestClient(orgName){
    if(!SEED||!orgName) return null;
    var target=norm(orgName);
    var ex=SEED.filter(function(c){ return norm(c.name)===target; });
    if(ex.length) return ex[0];
    var toks=target.split(/[^a-z0-9]+/).filter(function(w){ return w.length>2 && !SKIP[w]; });
    if(!toks.length) return null;
    var best=null,bs=0;
    SEED.forEach(function(c){ var n=norm(c.name),sc=0; toks.forEach(function(w){ if(n.indexOf(w)>=0) sc++; }); if(sc>bs){bs=sc;best=c;} });
    return bs>0?best:null;
  }

  // Monta o HTML do histórico de mensagens PÚBLICAS (type==2) p/ a descrição da Task.
  // Descrição em HTML MÍNIMO: um único <p> com <br> (o Tasks SC/Tspace só renderiza esse formato simples).
  function buildHistoryHtml(tk){
    var pub=((tk&&tk.actions)||[]).filter(function(a){ return !a.isDeleted && a.type===2; });
    pub.sort(function(a,b){ return String(a.createdDate||"").localeCompare(String(b.createdDate||"")); });
    var ct=contactOf(tk);
    var lines=[];
    if(ct.email||ct.phone) lines.push("Contato: "+(ct.name||"")+(ct.email?" <"+ct.email+">":"")+(ct.phone?" · Tel: "+ct.phone:""));
    if(!pub.length){ lines.push("(sem mensagens públicas registradas neste ticket)"); }
    else {
      lines.push("=== Histórico de mensagens públicas ("+pub.length+") ===");
      pub.forEach(function(a){
        var cb=a.createdBy||{}; var who=cb.businessName||cb.email||cb.id||"?";
        var ts=(a.createdDate||"").slice(0,19).replace("T"," ");
        var plain=(a.description||"").replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/[ \t]+\n/g,"\n").replace(/\n{3,}/g,"\n\n").trim();
        lines.push(""); lines.push("["+ts+"] "+who+":"); lines.push(plain);
      });
    }
    return "<p>"+esc(lines.join("\n")).replace(/\n/g,"<br>")+"</p>";
  }

  // Histórico de mensagens públicas em TEXTO puro (para a ocorrência da Task).
  function buildHistoryText(tk){
    var pub=((tk&&tk.actions)||[]).filter(function(a){ return !a.isDeleted && a.type===2; });
    pub.sort(function(a,b){ return String(a.createdDate||"").localeCompare(String(b.createdDate||"")); });
    var ct=contactOf(tk);
    var head=(ct.email||ct.phone)?("Contato: "+(ct.name||"")+(ct.email?" <"+ct.email+">":"")+(ct.phone?" · Tel: "+ct.phone:"")+"\n\n"):"";
    return head+pub.map(function(a){
      var cb=a.createdBy||{}; var who=cb.businessName||cb.email||cb.id||"?";
      var ts=(a.createdDate||"").slice(0,16).replace("T"," ");
      var txt=(a.description||"").replace(/<[^>]+>/g," ").replace(/\s+\n/g,"\n").trim();
      return "["+ts+"] "+who+":\n"+txt;
    }).join("\n\n----------\n\n");
  }

  function contactOf(tk){
    var c=(tk&&tk._contact)||{};
    var name=c.name, email=c.email, phone=c.phone;
    var cl=(((tk&&tk.clients)||[])[0])||{};
    if(!name) name=cl.businessName;
    if(!email) email=cl.email;
    if(!phone) phone=cl.phone||cl.phoneNumber;
    // dados salvos pelo sync (payload snake_case)
    if(!name) name=tk&&tk.client_name;
    if(!email) email=tk&&tk.client_email;
    if(!email){ // fallback: procura e-mail de um cliente nas ações
      var acts=(tk&&tk.actions)||[];
      for(var i=0;i<acts.length;i++){ var cb=acts[i].createdBy||{}; if(cb.email && (cb.personType===1||cb.personType===2||!cb.personType)){ email=cb.email; if(!name)name=cb.businessName; break; } }
    }
    return { name:name||"", email:email||"", phone:phone||"" };
  }
  function contactStr(ct){ return "Contato: "+(ct.name||"")+(ct.email?" <"+ct.email+">":"")+(ct.phone?" · Tel: "+ct.phone:""); }

        '<div class="tlb" id="tlb-'+i+'">'+esc(shown).replace(/\n/g,"<br>")+'</div>'+

  // Confirmação nativa + chamada à edge function
  function twoStep(btn, confirmMsg, run){
    if(!btn) return;
    var orig=btn.textContent;
    btn.addEventListener("click", async function(){
      if(!window.confirm(confirmMsg)) return;
      btn.disabled=true; btn.textContent="Enviando…";
      try{ await run(); }catch(e){ /* run trata msg */ }
      btn.disabled=false; btn.textContent=orig;
    });
  }
  function showMsg(id,ok,txt){ var m=document.getElementById(id); m.className="msg "+(ok?"ok":"er"); m.textContent=txt; }

  function wireDrawer(t){
    // Criar Task SC
    twoStep(document.getElementById("ct-btn"), t.tasks_id?("Alterar a descrição da Task "+t.tasks_id+"?"):"Criar a Task SC para o cliente informado?", async function(){
      var nota=(document.getElementById("ct-desc").value||"").trim();
      var incHist=document.getElementById("ct-hist").checked;
      if(incHist && !t._full){ showMsg("ct-msg",false,"Aguarde o histórico carregar (ou desmarque a opção) e tente de novo."); throw 0; }
      var histHtml=(incHist && t._full)?buildHistoryHtml(t._full):"";
      var descricao=(nota?('<p>'+esc(nota).replace(/\n/g,"<br>")+'</p>'):"")+(histHtml?("\n"+histHtml):"");

      // ---- Task já existe → ALTERAR descrição (GET→merge→PUT) ----
      if(t.tasks_id){
        try{
          var ru=await window.TSC.taskUpdate({ tasks_id:String(t.tasks_id), tasks_uuid:t.tasks_uuid||"", changes:{ description:descricao } });
          var rd=(ru&&ru.data)||ru;
          if(rd && rd.description_saved_len===0){
            showMsg("ct-msg",false,"PUT aceito, mas a descrição voltou vazia no Tasks SC — o formato pode estar sendo recusado. Me avise para ajustar.");
          } else {
            showMsg("ct-msg",true,"✓ Descrição da Task "+t.tasks_id+" atualizada"+(rd&&rd.description_saved_len?(" ("+rd.description_saved_len+" chars)"):"")+".");
          }
        }catch(e){ showMsg("ct-msg",false,"Erro: "+(e&&e.message?e.message:e)); throw e; }
        return;
      }

      // ---- Nova Task → CRIAR ----
      var customer=(document.getElementById("ct-customer").value||"").trim();
      if(!customer){ showMsg("ct-msg",false,"Informe o código do cliente no Tasks SC."); throw 0; }
      var est=parseFloat((document.getElementById("ct-est").value||"1").replace(",","."));
      var payload={
        title:(document.getElementById("ct-title").value||"").trim().slice(0,200),
        description:descricao,
        customer:customer,
        user_assigned:(document.getElementById("ct-user").value||"").trim(),
        assigned_customer:(document.getElementById("ct-cliente-resp")?document.getElementById("ct-cliente-resp").value:"").trim(),
        observer:obsValues(),
        time_estimate:isNaN(est)?1:est,
        tags:(document.getElementById("ct-tags").value||"").split(",").map(function(s){return s.trim();}).filter(Boolean),
        sla_days:parseInt(document.getElementById("ct-sla").value||"1",10),
        movidesk_ticket_id:String(t.id),
        movidesk_protocol:t.protocol||null
      };
      try{
        var r=await window.TSC.createTaskSc(payload);
        var d=(r&&r.data)||r;
        var newId=(d&&(d.id||d.tasks_id))||"(criada)";
        showMsg("ct-msg",true,"✓ Task SC criada: "+newId);
        t.tasks_id=newId; t.tasks_uuid=(d&&d.uuid)||t.tasks_uuid; t.tasks_created_at=new Date().toISOString();
        render();
      }catch(e){ showMsg("ct-msg",false,"Erro: "+(e&&e.message?e.message:e)); throw e; }
    });
    // Comentar Movidesk
    // mostra/esconde o campo motivo conforme "Resolvido" e lembra o último valor
    (function(){
      var res=document.getElementById("mc-res"), row=document.getElementById("mc-motrow"), mot=document.getElementById("mc-motivo");
      if(mot){ try{ mot.value=localStorage.getItem("sdhub_motivo")||""; }catch(e){} }
      var loaded=false;
      async function loadReasons(){
        if(loaded) return; loaded=true;
        var dl=document.getElementById("motlist"), h=document.getElementById("mc-mothint");
        try{
          var list=await window.TSC.reasons();           // fato gerador (custom field)
          var cs=await window.TSC.closeStatuses();        // status de encerramento + justificativa
          if(dl) dl.innerHTML=(list||[]).map(function(rn){ return '<option value="'+esc(rn)+'">'+esc(rn)+'</option>'; }).join("");
          var ss=document.getElementById("mc-status");
          if(ss) ss.innerHTML=(cs||[]).map(function(s){ return '<option value="'+esc(s.status)+'" data-just="'+esc(s.justification||"")+'">'+esc(s.status)+'</option>'; }).join("");
          if(h) h.textContent="Escolha o status de encerramento e o fato gerador.";
        }catch(e){ loaded=false; if(h) h.textContent="Não consegui buscar as opções: "+(e&&e.message?e.message:e); }
      }
      if(res&&row) res.addEventListener("change",function(){ row.style.display=res.checked?"block":"none"; if(res.checked){ if(mot) mot.focus(); loadReasons(); } });
    })();
    twoStep(document.getElementById("mc-btn"),"Enviar o comentário público ao cliente no Movidesk?", async function(){
      var text=(document.getElementById("mc-text").value||"").trim();
      if(!text){ showMsg("mc-msg",false,"Escreva o comentário."); throw 0; }
      var resolved=document.getElementById("mc-res").checked;
      var motivo=(document.getElementById("mc-motivo")?document.getElementById("mc-motivo").value:"").trim();
      var ss=document.getElementById("mc-status");
      var closeStatus=ss?ss.value:"";
      var closeJust=(ss&&ss.selectedOptions&&ss.selectedOptions[0])?ss.selectedOptions[0].getAttribute("data-just"):"";
      if(resolved && !closeStatus){ showMsg("mc-msg",false,"Escolha o status de encerramento."); throw 0; }
      if(resolved && !motivo){ showMsg("mc-msg",false,"Escolha o Fato gerador do atendimento."); throw 0; }
      if(resolved && motivo){ try{ localStorage.setItem("sdhub_motivo",motivo); }catch(e){} }
      var payload={ ticket_id:String(t.id), text:text, set_resolved:resolved, status:resolved?closeStatus:"", justification:resolved?closeJust:"", fato_gerador:resolved?motivo:"" };
      try{
        var r=await window.TSC.movideskComment(payload);
        showMsg("mc-msg",true,"✓ Comentário enviado"+(payload.set_resolved?" e ticket marcado como Resolvido.":". Rode Recarregar para refletir."));
        document.getElementById("mc-text").value="";
      }catch(e){ showMsg("mc-msg",false,"Erro: "+(e&&e.message?e.message:e)); throw e; }
    });
    // Adicionar ocorrência na Task SC (quando já existe Task)
    var ocb=document.getElementById("oc-btn");
    if(ocb) twoStep(ocb,"Gravar esta ocorrência no histórico da Task SC?", async function(){
      var texto=(document.getElementById("oc-text").value||"").trim();
      if(document.getElementById("oc-hist").checked && t._full){
        var h=buildHistoryText(t._full);
        if(h) texto=(texto?texto+"\n\n":"")+"=== Mensagens públicas do Movidesk ===\n\n"+h;
      }
      if(!texto){ showMsg("oc-msg",false,"Escreva a ocorrência ou marque incluir as mensagens."); throw 0; }
      try{
        await window.TSC.taskHistory({ tasks_id:String(t.tasks_id||""), tasks_uuid:t.tasks_uuid||"", details:texto, type:"1" });
        showMsg("oc-msg",true,"✓ Ocorrência gravada no histórico da Task "+t.tasks_id);
        document.getElementById("oc-text").value="";
      }catch(e){ showMsg("oc-msg",false,"Erro: "+(e&&e.message?e.message:e)); throw e; }
    });
    // Inserções rápidas no comentário Movidesk
    function insMc(txt){ var ta=document.getElementById("mc-text"); if(!ta||!txt) return; ta.value=(ta.value?ta.value.replace(/\s+$/,"")+"\n":"")+txt; ta.focus(); }
    var SHARE_BASE="https://tspace.tscst.com.br/#/ticket/";
    var it=document.getElementById("ins-task"); if(it) it.addEventListener("click",function(){ if(!t.tasks_id){ alert("Este ticket ainda não tem Task SC vinculada."); return; } insMc("Task SC #"+t.tasks_id); });
    var il=document.getElementById("ins-link"); if(il) il.addEventListener("click",function(){ if(!t.tasks_uuid && !t.tasks_id){ alert("Sem Task vinculada para gerar link."); return; } insMc("Acompanhe: "+SHARE_BASE+(t.tasks_uuid||t.tasks_id)); });
    var ir=document.getElementById("ins-resp"); if(ir) ir.addEventListener("click",function(){ var s=document.getElementById("ct-cliente-resp"); var nm=(s&&s.value&&s.selectedOptions[0])?s.selectedOptions[0].textContent.trim():""; if(!nm){ alert("Selecione o Responsável do cliente na área de criação da Task."); return; } insMc("Responsável (cliente): "+nm); });
    var io=document.getElementById("ins-obs"); if(io) io.addEventListener("click",function(){ var nomes=obsValues().map(function(v){return OBS_SEL[v];}); if(!nomes.length){ alert("Selecione observadores na área de criação da Task."); return; } insMc("Observadores: "+nomes.join(", ")); });
    // Classificar (IA)
    var clb=document.getElementById("cl-btn");
    if(clb) clb.addEventListener("click", async function(){
      clb.disabled=true; var o=clb.textContent; clb.textContent="Classificando…";
      try{
        var r=await window.TSC.classify({ title:t.subject||"", description:(document.getElementById("ct-desc")?document.getElementById("ct-desc").value:"")||t.subject||"" });
        var sug=(r&&(r.suggestion||r.data))||"";
        showMsg("cl-msg",true,"Categoria sugerida: "+(sug||"(sem retorno)"));
      }catch(e){ showMsg("cl-msg",false,"Erro: "+(e&&e.message?e.message:e)); }
      clb.disabled=false; clb.textContent=o;
    });
  }

  // ---------- carregamento ----------
  async function load(){
    document.getElementById("board").innerHTML='<div class="center-load">Carregando tickets…</div>';
    try{
      await window.TSC.requireSession();
      var u=await window.TSC.currentUser();
      document.getElementById("who").textContent=u?u.email:"";
      TICKETS=await window.TSC.getMovidesk();
      TICKETS=TICKETS.filter(Boolean);
      fillSelects(); renderKpis(); render();
    }catch(e){
      document.getElementById("board").innerHTML='<div class="center-load">Falha ao carregar: '+esc(e&&e.message?e.message:e)+'</div>';
    }
  }

  // ---------- eventos ----------
  ["q","fEmpresa","fUrg","fTask","fUpd","fResolv"].forEach(function(id){
    document.getElementById(id).addEventListener("input",render);
    document.getElementById(id).addEventListener("change",render);
  });
  document.getElementById("dx").addEventListener("click",closeDrawer);
  document.getElementById("ov").addEventListener("click",closeDrawer);
  document.getElementById("btnReload").addEventListener("click",load);
  document.getElementById("btnLogout").addEventListener("click",async function(){ await window.TSC.logout(); location.reload(); });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeDrawer(); });

  load();
})();
</script>
</body>
</html>
